<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豆香传 - 一杯豆浆，敬过往，连世界，创未来</title>
    <meta name="description" content="豆香传 - 跨越语言与国界的豆浆文化线上家园，连接全球华人及国际中华文化爱好者">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&family=Oranienbaum&family=Quattrocento+Sans:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Custom Styles -->
    <style>
        :root {
            --soy-white: #F5F5DC;
            --warm-beige: #FDF5E6;
            --ancient-brown: #A67B5B;
            --health-green: #8FBC8F;
            --text-dark: #4A4A4A;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--soy-white);
            color: var(--text-dark);
        }
        
        .font-serif-cn {
            font-family: 'Noto Serif SC', serif;
        }
        
        .font-sans-cn {
            font-family: 'Noto Sans SC', sans-serif;
        }
        
        .hero-bg {
            background-image: url('./resources/hero-bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        .glass-effect {
            backdrop-filter: blur(10px);
            background: rgba(253, 245, 230, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-primary {
            background-color: var(--ancient-brown);
            color: white;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            background-color: #8B6B4B;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(166, 123, 91, 0.3);
        }
        
        .btn-secondary {
            background-color: var(--health-green);
            color: white;
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            background-color: #7AA87A;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(143, 188, 143, 0.3);
        }
        
        .form-input {
            border: 2px solid #E5E7EB;
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            border-color: var(--ancient-brown);
            box-shadow: 0 0 0 3px rgba(166, 123, 91, 0.1);
        }
        
        .social-btn {
            transition: all 0.3s ease;
        }
        
        .social-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .fade-in {
            animation: fadeIn 0.8s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .slide-up {
            animation: slideUp 0.6s ease-out;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 glass-effect">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <div class="flex items-center space-x-3">
                    <img src="./resources/logo.png" alt="豆香传" class="h-10 w-10">
                    <span class="font-serif-cn text-2xl font-bold text-ancient-brown">豆香传</span>
                </div>
                
                <!-- Language Switcher -->
                <div class="flex items-center space-x-2">
                    <button class="px-3 py-1 text-sm font-medium text-ancient-brown hover:bg-white hover:bg-opacity-50 rounded-md transition-colors">
                        简体
                    </button>
                    <button class="px-3 py-1 text-sm font-medium text-gray-500 hover:text-ancient-brown hover:bg-white hover:bg-opacity-30 rounded-md transition-colors">
                        繁體
                    </button>
                    <button class="px-3 py-1 text-sm font-medium text-gray-500 hover:text-ancient-brown hover:bg-white hover:bg-opacity-30 rounded-md transition-colors">
                        EN
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-bg min-h-screen flex items-center justify-center relative">
        <div class="absolute inset-0 bg-black bg-opacity-20"></div>
        
        <!-- Welcome Message -->
        <div class="relative z-10 text-center mb-16 px-4 fade-in">
            <h1 class="font-serif-cn text-5xl md:text-6xl font-bold text-white mb-4">
                豆香传
            </h1>
            <p class="font-sans-cn text-xl md:text-2xl text-white text-opacity-90 mb-2">
                一杯豆浆，敬过往，连世界，创未来
            </p>
            <p class="font-sans-cn text-lg text-white text-opacity-80">
                A Cup of Soy Milk: Honoring the Past, Connecting the World
            </p>
        </div>
        
        <!-- Login/Register Card -->
        <div class="relative z-10 w-full max-w-md mx-4 slide-up">
            <div class="glass-effect rounded-2xl p-8 shadow-2xl">
                <!-- Tab Switcher -->
                <div class="flex mb-8 bg-white bg-opacity-50 rounded-lg p-1">
                    <button id="loginTab" class="flex-1 py-3 px-4 rounded-md font-medium text-center transition-all duration-300 bg-ancient-brown text-white">
                        登录
                    </button>
                    <button id="registerTab" class="flex-1 py-3 px-4 rounded-md font-medium text-center transition-all duration-300 text-ancient-brown hover:text-white">
                        注册
                    </button>
                </div>
                
                <!-- Login Form -->
                <form id="loginForm" class="space-y-6">
                    <div class="text-center mb-6">
                        <h2 class="font-serif-cn text-2xl font-semibold text-ancient-brown mb-2">
                            寻回豆浆里的温暖记忆
                        </h2>
                        <p class="text-sm text-gray-600">
                            登录解锁更多精彩内容
                        </p>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            邮箱或手机号
                        </label>
                        <input type="text" id="loginEmail" class="form-input w-full px-4 py-3 rounded-lg focus:outline-none" placeholder="请输入邮箱或手机号" required>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            密码
                        </label>
                        <input type="password" id="loginPassword" class="form-input w-full px-4 py-3 rounded-lg focus:outline-none" placeholder="请输入密码" required>
                    </div>
                    
                    <div class="flex items-center justify-between">
                        <label class="flex items-center">
                            <input type="checkbox" class="rounded border-gray-300 text-ancient-brown focus:ring-ancient-brown">
                            <span class="ml-2 text-sm text-gray-600">记住我</span>
                        </label>
                        <a href="#" class="text-sm text-ancient-brown hover:text-ancient-brown hover:underline">
                            忘记密码？
                        </a>
                    </div>
                    
                    <button type="submit" class="btn-primary w-full py-3 px-4 rounded-lg font-medium text-lg">
                        登录
                    </button>
                </form>
                
                <!-- Register Form -->
                <form id="registerForm" class="space-y-6 hidden">
                    <div class="text-center mb-6">
                        <h2 class="font-serif-cn text-2xl font-semibold text-ancient-brown mb-2">
                            加入豆香传大家庭
                        </h2>
                        <p class="text-sm text-gray-600">
                            注册成为会员，开启文化之旅
                        </p>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            用户名
                        </label>
                        <input type="text" id="registerUsername" class="form-input w-full px-4 py-3 rounded-lg focus:outline-none" placeholder="请设置用户名" required>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            邮箱
                        </label>
                        <input type="email" id="registerEmail" class="form-input w-full px-4 py-3 rounded-lg focus:outline-none" placeholder="请输入邮箱地址" required>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            密码
                        </label>
                        <input type="password" id="registerPassword" class="form-input w-full px-4 py-3 rounded-lg focus:outline-none" placeholder="请设置密码（至少6位）" required>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            确认密码
                        </label>
                        <input type="password" id="confirmPassword" class="form-input w-full px-4 py-3 rounded-lg focus:outline-none" placeholder="请再次输入密码" required>
                    </div>
                    
                    <div class="flex items-center">
                        <input type="checkbox" class="rounded border-gray-300 text-ancient-brown focus:ring-ancient-brown" required>
                        <span class="ml-2 text-sm text-gray-600">
                            我已阅读并同意 <a href="#" class="text-ancient-brown hover:underline">服务条款</a> 和 <a href="#" class="text-ancient-brown hover:underline">隐私政策</a>
                        </span>
                    </div>
                    
                    <button type="submit" class="btn-primary w-full py-3 px-4 rounded-lg font-medium text-lg">
                        注册
                    </button>
                </form>
                
                <!-- Social Login -->
                <div class="mt-8">
                    <div class="relative">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-gray-300"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-2 bg-warm-beige bg-opacity-50 text-gray-500">
                                或使用以下方式
                            </span>
                        </div>
                    </div>
                    
                    <div class="mt-6 grid grid-cols-3 gap-3">
                        <button class="social-btn w-full inline-flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M8.5 12c0-1.9 1.6-3.5 3.5-3.5s3.5 1.6 3.5 3.5-1.6 3.5-3.5 3.5S8.5 13.9 8.5 12z"/>
                                <path d="M12 1C5.9 1 1 5.9 1 12s4.9 11 11 11 11-4.9 11-11S18.1 1 12 1zm0 20c-5 0-9-4-9-9s4-9 9-9 9 4 9 9-4 9-9 9z"/>
                            </svg>
                        </button>
                        
                        <button class="social-btn w-full inline-flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
                            <svg class="w-5 h-5 text-red-500" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12.017 0C5.396 0 .029 5.367.029 11.987c0 5.079 3.158 9.417 7.618 11.174-.105-.949-.199-2.403.041-3.439.219-.937 1.406-5.957 1.406-5.957s-.359-.72-.359-1.781c0-1.663.967-2.911 2.168-2.911 1.024 0 1.518.769 1.518 1.688 0 1.029-.653 2.567-.992 3.992-.285 1.193.6 2.165 1.775 2.165 2.128 0 3.768-2.245 3.768-5.487 0-2.861-2.063-4.869-5.008-4.869-3.41 0-5.409 2.562-5.409 5.199 0 1.033.394 2.143.889 2.741.099.12.112.225.085.345-.09.375-.293 1.199-.334 1.363-.053.225-.172.271-.402.165-1.495-.69-2.433-2.878-2.433-4.646 0-3.776 2.748-7.252 7.92-7.252 4.158 0 7.392 2.967 7.392 6.923 0 4.135-2.607 7.462-6.233 7.462-1.214 0-2.357-.629-2.75-1.378l-.748 2.853c-.271 1.043-1.002 2.35-1.492 3.146C9.57 23.812 10.763 24.009 12.017 24.009c6.624 0 11.99-5.367 11.99-11.988C24.007 5.367 18.641.001.012.001z"/>
                            </svg>
                        </button>
                        
                        <button class="social-btn w-full inline-flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
                            <svg class="w-5 h-5 text-green-600" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1.213.665l.854 1.562a.59.59 0 0 0 .744.353l1.841-.823a.59.59 0 0 1 .486.034 8.11 8.11 0 0 0 3.878.988c.575 0 1.143-.073 1.695-.215a.59.59 0 0 1 .64.237l1.31 1.906a.59.59 0 0 0 .49.296h.598a.59.59 0 0 0 .49-.296l1.31-1.906a.59.59 0 0 1 .64-.237c.552.142 1.12.215 1.695.215 4.8 0 8.69-3.288 8.69-7.342 0-4.054-3.89-7.342-8.69-7.342z"/>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <!-- Continue as Guest -->
                <div class="mt-8 text-center">
                    <a href="index.html" class="btn-secondary inline-block px-6 py-3 rounded-lg font-medium">
                        继续浏览
                    </a>
                    <p class="mt-3 text-sm text-gray-600">
                        无需登录，探索豆浆文化
                    </p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-ancient-brown text-white py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <div class="flex items-center justify-center space-x-3 mb-4">
                <img src="./resources/logo.png" alt="豆香传" class="h-8 w-8 opacity-80">
                <span class="font-serif-cn text-xl font-semibold">豆香传</span>
            </div>
            <p class="text-sm opacity-80">
                © 2025 豆香传 (Bean Aroma Legacy). 保留所有权利。
            </p>
            <p class="text-xs opacity-60 mt-2">
                一杯豆浆，敬过往，连世界，创未来
            </p>
        </div>
    </footer>

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

    storageBucket: "doujiang-auth.firebasestorage.app",

    <script src="main.js"></script>
</body>
</html>
